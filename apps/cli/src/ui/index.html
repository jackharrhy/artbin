<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>artbin - browse scan</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwindcss.config = {
        theme: {
          extend: {
            colors: {
              text: "#1a1a1a",
              "text-muted": "#666",
              "bg-hover": "#eaeae5",
              "bg-subtle": "#e8e8e3",
              "border-light": "#d0d0c8",
            },
          },
        },
      };
    </script>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html,
      body {
        font-family: "Times New Roman", Times, serif;
        background: #f5f5f0;
        color: #1a1a1a;
      }
      .modal-overlay {
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.5);
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 200;
      }
      .modal {
        background: #f5f5f0;
        border: 1px solid #d0d0c8;
        width: 90%;
        max-width: 500px;
        max-height: 80vh;
        overflow-y: auto;
      }
      .modal-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 16px;
        border-bottom: 1px solid #d0d0c8;
      }
      .modal-title {
        font-size: 1.125rem;
        font-weight: 600;
      }
      .modal-close {
        background: none;
        border: none;
        font-size: 1.5rem;
        cursor: pointer;
        color: #666;
        font-family: inherit;
      }
      .modal-body {
        padding: 16px;
      }
      input[type="checkbox"] {
        accent-color: #1a1a1a;
      }
      select,
      button {
        font-family: "Times New Roman", Times, serif;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="./main.tsx"></script>
  </body>
</html>
